name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate the action before releasing
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: shellcheck
        run: |
          shellcheck --severity=warning \
            scripts/install.sh \
            scripts/run.sh \
            scripts/clean-comments.sh

      - name: actionlint
        uses: rhysd/actionlint@011a6d15e749bb3f2d771eed9c7aa0e7e3e10ee7
        with:
          files: action.yml

  # ---------------------------------------------------------------------------
  # Job 2: Run the full test matrix before publishing
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Smoke test — clean file
        uses: ./
        with:
          files: tests/fixtures/clean.txt
          on-threat: fail

      - name: Smoke test — ANSI-only file
        uses: ./
        with:
          files: tests/fixtures/ansi_only.txt
          on-threat: fail

  # ---------------------------------------------------------------------------
  # Job 3: Create GitHub Release and update floating major tag
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "${VERSION}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${VERSION}' is not a valid semver release tag (expected v<major>.<minor>.<patch>)." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists, skipping creation."
          else
            gh release create "${VERSION}" \
              --title "strip-ansi-action ${VERSION}" \
              --generate-notes \
              --verify-tag
          fi

      - name: Update floating major tag (e.g. v1)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR_TAG="$(printf '%s\n' "${VERSION}" | sed -n 's/^\(v[0-9][0-9]*\)\.[0-9][0-9]*\.[0-9][0-9]*$/\1/p')"
          if [ -z "${MAJOR_TAG}" ]; then
            echo "::error::Could not derive major tag from '${VERSION}'." >&2
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag --force "${MAJOR_TAG}"
          git push --force origin "${MAJOR_TAG}"
          echo "Updated floating tag ${MAJOR_TAG} → ${VERSION}"
