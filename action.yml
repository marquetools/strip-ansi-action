name: "Strip ANSI & Unicode Threats"
description: >
  Strips ANSI escape sequences and Unicode homograph threats from PR files and GitHub comments.
  Auto-cleans LLM-polluted PR/issue comments (set on-threat: strip).
  Detects and blocks echoback attack vectors (terminal keystroke injection via ANSI sequences).
author: "Knitli Inc."
branding:
  icon: "shield"
  color: "blue"

inputs:
  files:
    description: >
      Newline- or space-separated list of file paths to scan.
      Typically populated from the output of a changed-files step or a similar action.
      Leave empty when only scanning PR or Issue comments.
    required: false
    default: ""

  on-threat:
    description: >
      Action to take when an echoback attack vector is detected.
      Accepted values: fail (default), strip, warn.
        fail  — mark files, emit ::error annotations, and exit non-zero after all files are processed.
        strip — remove threats from output and continue; sets the threat-detected output to true.
        warn  — emit ::warning annotations and continue; sets the threat-detected output to true.
    required: false
    default: "fail"

  unicode-map:
    description: >
      Reserved for a future release of distill-strip-ansi that will support
      Unicode normalization map selection. Has no effect with the current version.
    required: false
    default: ""

  no-unicode-map:
    description: >
      Reserved for a future release of distill-strip-ansi that will support
      Unicode normalization map selection. Has no effect with the current version.
    required: false
    default: ""

  preset:
    description: >
      ANSI filter preset controlling which escape sequences survive.
      Accepted values: dumb, color, sanitize (default), tmux, xterm, full.
        dumb     — strip everything.
        color    — keep SGR colors/styles only.
        sanitize — safe default; keeps safe OSC (titles, links), strips echoback vectors.
        tmux     — all CSI and Fe sequences.
        xterm    — all OSC sequences.
        full     — pass everything through.
    required: false
    default: "sanitize"

  version:
    description: "Version of distill-strip-ansi to install (must match a published crates.io release)."
    required: false
    default: "0.5.2"

  clean-pr-comments:
    description: >
      When true, fetches all comments on the pull request that triggered this workflow
      (both discussion comments and review comments) and scans them for ANSI/Unicode threats.
      Requires a token with pull-requests:read (and pull-requests:write when on-threat=strip).
      Only meaningful when the workflow is triggered by a pull_request or pull_request_review_comment event.
    required: false
    default: "false"

  clean-issue-comments:
    description: >
      When true, fetches all comments on the issue that triggered this workflow and scans
      them for ANSI/Unicode threats.
      Requires a token with issues:read (and issues:write when on-threat=strip).
      Only meaningful when the workflow is triggered by an issues or issue_comment event.
    required: false
    default: "false"

  github-token:
    description: >
      GitHub token used to read and (when on-threat=strip) update PR/Issue comments.
      Defaults to the built-in github.token. Only used when clean-pr-comments or
      clean-issue-comments is true.
    required: false
    default: ""

outputs:
  results:
    description: >
      JSON array of per-file scan results.
      Schema: [{"file":"<path>","status":"clean|stripped|threat","output":"<stripped content>"}]
      The output field is empty for files with detected threats unless on-threat=strip.
      Note: large files may be truncated in this field; check runner logs for full output.
    value: ${{ steps.process.outputs.results }}

  threat-detected:
    description: "'true' if any scanned file contained an echoback attack vector, 'false' otherwise."
    value: ${{ steps.process.outputs.threat-detected }}

  files-with-threats:
    description: "Newline-separated list of file paths that contained detected threats."
    value: ${{ steps.process.outputs.files-with-threats }}

  comment-results:
    description: >
      JSON array of per-comment scan results (populated when clean-pr-comments or
      clean-issue-comments is true).
      Schema: [{"id":"<id>","type":"pr_comment|review_comment|issue_comment","url":"<html_url>","status":"clean|stripped|threat","output":"<stripped content>"}]
    value: ${{ steps.process-comments.outputs.comment-results }}

  comment-threat-detected:
    description: >
      'true' if any scanned comment contained an echoback attack vector, 'false' otherwise.
      Only set when clean-pr-comments or clean-issue-comments is true.
    value: ${{ steps.process-comments.outputs.comment-threat-detected }}

  comments-with-threats:
    description: >
      Newline-separated list of comment HTML URLs that contained detected threats.
      Only set when clean-pr-comments or clean-issue-comments is true.
    value: ${{ steps.process-comments.outputs.comments-with-threats }}

runs:
  using: composite
  steps:
    - name: Restore cached strip-ansi binary
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: ~/.local/bin/strip-ansi
        key: strip-ansi-${{ inputs.version }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install distill-strip-ansi
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/scripts/install.sh"
        "${{ github.action_path }}/scripts/install.sh"
      env:
        STRIP_ANSI_VERSION: ${{ inputs.version }}

    - name: Add install dir to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Process files
      id: process
      if: ${{ inputs.files != '' }}
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/scripts/run.sh"
        "${{ github.action_path }}/scripts/run.sh"
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_ON_THREAT: ${{ inputs.on-threat }}
        INPUT_PRESET: ${{ inputs.preset }}

    - name: Process comments
      id: process-comments
      if: ${{ inputs.clean-pr-comments == 'true' || inputs.clean-issue-comments == 'true' }}
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/scripts/clean-comments.sh"
        "${{ github.action_path }}/scripts/clean-comments.sh"
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        INPUT_CLEAN_PR_COMMENTS: ${{ inputs.clean-pr-comments }}
        INPUT_CLEAN_ISSUE_COMMENTS: ${{ inputs.clean-issue-comments }}
        INPUT_ON_THREAT: ${{ inputs.on-threat }}
        INPUT_PRESET: ${{ inputs.preset }}

    - name: Fail on detected threats
      if: ${{ inputs.on-threat == 'fail' && (steps.process.outputs.threat-detected == 'true' || steps.process-comments.outputs.comment-threat-detected == 'true') }}
      shell: bash
      run: |
        escape_annotation_property() {
          local s="$1"
          s="${s//'%'/'%25'}"
          s="${s//$'\r'/'%0D'}"
          s="${s//$'\n'/'%0A'}"
          s="${s//':'/'%3A'}"
          s="${s//','/'%2C'}"
          printf '%s' "${s}"
        }
        escape_annotation_message() {
          local s="$1"
          s="${s//'%'/'%25'}"
          s="${s//$'\r'/'%0D'}"
          s="${s//$'\n'/'%0A'}"
          printf '%s' "${s}"
        }
        echo "::error::ANSI/Unicode echoback threat(s) detected. See annotated files and comments below."
        while IFS= read -r f; do
          if [ -n "$f" ]; then
            ef="$(escape_annotation_property "$f")"
            msg="$(escape_annotation_message "Echoback attack vector detected in $f")"
            echo "::error file=${ef}::${msg}"
          fi
        done <<< "${{ steps.process.outputs.files-with-threats }}"
        while IFS= read -r url; do
          if [ -n "$url" ]; then
            msg="$(escape_annotation_message "Echoback attack vector detected in comment: $url")"
            echo "::error::${msg}"
          fi
        done <<< "${{ steps.process-comments.outputs.comments-with-threats }}"
        exit 1
